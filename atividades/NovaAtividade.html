<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Atividade</title>
    <link
      rel="stylesheet"
      href="../atividades/Css_atividade/NovaAtividade.css"
    />
  </head>
  <body>
    <main>
      <header>
        <nav>
          <div class="nav-links">
            <a href="#">Produtos</a>
            <a href="#">Recursos</a>
            <a href="#">Inspiraçoes</a>
            <a href="#">Preços</a>
          </div>

          <div class="nav-logo"><img src="../imagens/figura1.png" /></div>

          <div class="nav-right">
            <img src="../imagens/figura4.png" alt="" />
            <button class="conectar">Conectar</button>
            <button class="cadastre">Cadastre-se gratuitamente</button>
          </div>
        </nav>
      </header>

      <section class="hero">
        <div class="left">
          <h1>As lojas do Mailchimp já estão disponível</h1>
          <p>
            Impulsione as vendas, envolva os clientes e anuncie seu negócio em
            um só lugar. Crie sua loja virtual gratuitamente.
          </p>
          <button class="saiba">Saiba mais</button>
        </div>

        <div class="right">
          <div class="big">
            <div class="menu">
              <img src="../imagens/tres_pontinhos.png" class="ponto" />
              <img src="../imagens/carrinho.png" class="carro" />
            </div>
            <h2>Big Mood Spa</h2>
            <img src="../imagens/figura2.png" class="pote" />
          </div>

          <div class="shopping">
            <h3>shopping Cart</h3>
            <img src="../imagens/figua3.png" class="produtos">
            <button class="btnproduto">Continue To Checkout</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
