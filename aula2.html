<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Aula</title>
    <style>
        body{
            background-color: rgb(0, 100, 0);
            color: aliceblue; /* muda cor da fonte*/
            font-size: 20px; /*tamanho da fonte */
            font-family: verdana; /*tipo de fonte */
            text-align: center; /*alinha a fonte no centro */
            background-image: url(imagens/WhatsApp\ Image\ 2026-02-16\ at\ 21.30.46.jpeg); /*insere imagens no fundo*/
            background-repeat: no-repeat; /* tira a repetição da imagem no fundo */
            background-size: cover; /*ajusta a imagem na área disponível */
            background-attachment: fixed; /* fixa a imagem no plano de fundo */
        }

        h1{
            background-color: antiquewhite;
            color: darkgreen;
            font-weight: normal; /*colocar ou retirar o negrito */
        }

        p{
            background-color: rgb(190, 203, 157);
            text-align: justify;
            width: 300px;
            height: 300px;
            margin: 50px; /*determina o tamanho de margem p/ os 4 lados do componente*/
            margin-left: 500px; 
            padding: 10px; /* espaço para dentro da área */
            border: 5px; /* borda */
            border-style: solid; /* estilo da borda */
            border-color: aquamarine; /*cor da borda */
            border-radius: 10px; /* arredondamento de bordas */
        }
        img{
            width: 400px;
            height: 300px;
            border: 10px solid green;
        }

        hr{
            width: 50%;
            height: 5px;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1> Boa passagem</h1>
    <p>Há mais de 54 anos cuidando de cada detalhe com respeito, tradição e carinho,
        <br /> oferecendo uma despedida digna e serena para quem você ama.</p>
        <hr />

        <img src="imagens/WhatsApp Image 2026-02-16 at 21.30.46.jpeg" />
    
    </body>
</html>
